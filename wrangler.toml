name = "nevoflux-www"
pages_build_output_dir = "dist"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# D1 holds users, sessions, and the pack registry. The id is a public resource
# identifier (not a secret); access still requires Cloudflare auth.
[[d1_databases]]
binding = "DB"
database_name = "nevoflux-www"
database_id = "1706c9da-dd25-4071-b4eb-74bcf9d04c70"
migrations_dir = "migrations"

# KV caches GitHub responses and backs rate limiting.
[[kv_namespaces]]
binding = "CACHE"
id = "6ffb48de05d24b18ab903edeccfd3cb5"

# All runtime env vars + secrets are configured in the Pages dashboard
# (Settings -> Environment variables): BETTER_AUTH_URL, BETTER_AUTH_SECRET,
# GOOGLE_CLIENT_ID/SECRET, GITHUB_OAUTH_CLIENT_ID/SECRET, GITHUB_TOKEN,
# RESEND_API_KEY, RESEND_FROM. wrangler.toml [vars] are NOT exposed to the
# Pages Functions runtime, so they live in the dashboard instead.
